/*Ejercicio 32 - Async & Await 
El async y await practicamente sirve para hacerlo por turnos para que se ejecute por tiempos osea no avanza hasta que concluya el de arriba
y ya que termina se pasa a la siguiente linea de abajo, esto para llevar una jerarquia, esto no pasa con .then en el .then puede que hagarre primero
lo de abajo y despues el de arriba y al final el catch, dependiendo de la informacion del servidor de que es mas ligero para mostrar primero y se muestre.
*/

// 1. Le avisamos a JS que esta función es asincrónica con "async"
async function obtenerPokemon() {
    
    // 2. JS se frena aquí hasta que el servidor responda, y guarda el paquete en "respuesta"
    let respuesta = await fetch("https://pokeapi.co/api/v2/pokemon/ditto");
    
    // 3. JS se frena aquí hasta que se abra el paquete, y guarda el objeto en "info"
    let info = await respuesta.json();
    
    // 4. Como ya tenemos los datos, los usamos normalmente
    console.log("El pokemon moderno es:", info.name);
}

// 5. Al final, mandamos a llamar a la función para que corra
obtenerPokemon();

async function tiendaRetro() {

        // [PASO A]: Trae los datos de internet usando fetch y espera la respuesta.
        // Usa este endpoint de prueba: "https://jsonplaceholder.typicode.com/todos/1"
        let respuesta = await fetch("https://jsonplaceholder.typicode.com/todos/1"); 
        
        let datos = await respuesta.json();
        console.log("2. Conexión exitosa con el servidor.");

        // --- Nuestro inventario de videojuegos antiguos ---
        let inventarioRetro = [
            { titulo: "Zelda: Wind Waker", precio: 1200 },
            { titulo: "Pokémon Rojo", precio: 2500 },
            { titulo: "Super Mario World", precio: 180 },
            { titulo: "Tetris Classic", precio: 90 }
        ];

        console.log("3. Filtrando los juegos más valiosos...");

        // [PASO B]: Usa .filter() para guardar en "juegosCaros" 
        // solo los juegos que tengan un precio MAYOR a 500.
        let juegosCaros = inventarioRetro.filter(function(cantidad){
          return cantidad.precio > 500
        });

        console.log("--- JUEGOS DE COLECCIÓN ENCONTRADOS (Mayores a $500) ---");

        juegosCaros.forEach(cantidad => {
          console.log(`Juego: ${cantidad.titulo} - Precio: $ ${cantidad.precio} MXN`);
        })
        

    } catch (error) {
        console.log("Error en el sistema de la tienda:", error);
    }
}
